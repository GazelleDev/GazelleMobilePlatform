version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/Detroit"
    open-pull-requests-limit: 4
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "dependabot"
    groups:
      fastify-stack:
        patterns:
          - "fastify"
          - "@fastify/*"
      expo-react-stack:
        patterns:
          - "react"
          - "react-*"
          - "expo"
          - "expo-*"
          - "@expo/*"
      tooling:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript"
          - "vitest"
          - "turbo"
          - "prettier"
          - "@types/*"
      other-npm:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:15"
      timezone: "America/Detroit"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
      - "dependabot"
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
