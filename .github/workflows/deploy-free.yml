name: deploy-free

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "packages/contracts/**"
      - "packages/persistence/**"
      - "infra/free/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-free.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy prerequisites
        id: free-check
        env:
          DEPLOY_HOST: ${{ secrets.FREE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.FREE_DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.FREE_DEPLOY_SSH_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.FREE_POSTGRES_PASSWORD }}
          GATEWAY_INTERNAL_API_TOKEN: ${{ secrets.FREE_GATEWAY_INTERNAL_API_TOKEN }}
          ORDERS_INTERNAL_API_TOKEN: ${{ secrets.FREE_ORDERS_INTERNAL_API_TOKEN }}
          LOYALTY_INTERNAL_API_TOKEN: ${{ secrets.FREE_LOYALTY_INTERNAL_API_TOKEN }}
          NOTIFICATIONS_INTERNAL_API_TOKEN: ${{ secrets.FREE_NOTIFICATIONS_INTERNAL_API_TOKEN }}
          JWT_SECRET: ${{ secrets.FREE_JWT_SECRET }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          API_DOMAIN: ${{ vars.FREE_API_DOMAIN }}
          IMAGE_REGISTRY_PREFIX: ${{ vars.FREE_IMAGE_REGISTRY_PREFIX }}
          PAYMENTS_PROVIDER_MODE: ${{ vars.FREE_PAYMENTS_PROVIDER_MODE }}
          CLOVER_CHARGE_ENDPOINT: ${{ vars.FREE_CLOVER_CHARGE_ENDPOINT }}
          CLOVER_REFUND_ENDPOINT: ${{ vars.FREE_CLOVER_REFUND_ENDPOINT }}
          CLOVER_APPLE_PAY_TOKENIZE_ENDPOINT: ${{ vars.FREE_CLOVER_APPLE_PAY_TOKENIZE_ENDPOINT }}
          CLOVER_BEARER_TOKEN: ${{ secrets.FREE_CLOVER_BEARER_TOKEN }}
          CLOVER_API_KEY: ${{ secrets.FREE_CLOVER_API_KEY }}
          CLOVER_API_ACCESS_KEY: ${{ secrets.FREE_CLOVER_API_ACCESS_KEY }}
          CLOVER_MERCHANT_ID: ${{ secrets.FREE_CLOVER_MERCHANT_ID }}
          CLOVER_APP_ID: ${{ secrets.FREE_CLOVER_APP_ID }}
          CLOVER_APP_SECRET: ${{ secrets.FREE_CLOVER_APP_SECRET }}
          CLOVER_OAUTH_REDIRECT_URI: ${{ secrets.FREE_CLOVER_OAUTH_REDIRECT_URI }}
          CLOVER_OAUTH_STATE_SECRET: ${{ secrets.FREE_CLOVER_OAUTH_STATE_SECRET }}
          CLOVER_WEBHOOK_SHARED_SECRET: ${{ secrets.FREE_CLOVER_WEBHOOK_SHARED_SECRET }}
        run: |
          missing=0
          for required in DEPLOY_HOST DEPLOY_USER DEPLOY_KEY POSTGRES_PASSWORD GATEWAY_INTERNAL_API_TOKEN ORDERS_INTERNAL_API_TOKEN LOYALTY_INTERNAL_API_TOKEN NOTIFICATIONS_INTERNAL_API_TOKEN JWT_SECRET LETSENCRYPT_EMAIL API_DOMAIN IMAGE_REGISTRY_PREFIX; do
            if [ -z "${!required}" ]; then
              echo "missing: ${required}"
              missing=1
            fi
          done

          if [ "${PAYMENTS_PROVIDER_MODE:-simulated}" = "live" ]; then
            for required in CLOVER_MERCHANT_ID CLOVER_CHARGE_ENDPOINT CLOVER_REFUND_ENDPOINT CLOVER_APPLE_PAY_TOKENIZE_ENDPOINT CLOVER_WEBHOOK_SHARED_SECRET; do
              if [ -z "${!required}" ]; then
                echo "missing for live Clover deploy: ${required}"
                missing=1
              fi
            done

            has_direct_charge_credentials=0
            if [ -n "${CLOVER_BEARER_TOKEN:-${CLOVER_API_KEY:-}}" ]; then
              has_direct_charge_credentials=1
            fi

            has_oauth_bootstrap=1
            for required in CLOVER_APP_ID CLOVER_APP_SECRET CLOVER_OAUTH_REDIRECT_URI CLOVER_OAUTH_STATE_SECRET; do
              if [ -z "${!required}" ]; then
                has_oauth_bootstrap=0
              fi
            done

            if [ "${has_direct_charge_credentials}" -eq 0 ] && [ "${has_oauth_bootstrap}" -eq 0 ]; then
              echo "missing for live Clover deploy: provide either direct charge credentials or a full Clover OAuth bootstrap"
              missing=1
            fi

            has_wallet_tokenization_credentials=0
            if [ -n "${CLOVER_API_ACCESS_KEY:-}" ] || [ "${has_oauth_bootstrap}" -eq 1 ]; then
              has_wallet_tokenization_credentials=1
            fi

            if [ "${has_wallet_tokenization_credentials}" -eq 0 ]; then
              echo "missing for live Clover deploy: mobile Apple Pay wallet charges need CLOVER_API_ACCESS_KEY or a full Clover OAuth bootstrap"
              missing=1
            fi
          fi

          if [ "${missing}" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping free deploy because one or more required secrets/variables are missing."
          fi

      - name: Setup SSH key
        if: steps.free-check.outputs.enabled == 'true'
        env:
          DEPLOY_KEY: ${{ secrets.FREE_DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Copy deployment bundle to server
        if: steps.free-check.outputs.enabled == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.FREE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.FREE_DEPLOY_USER }}
          FREE_DEPLOY_PATH: ${{ vars.FREE_DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${FREE_DEPLOY_PATH:-/opt/gazelle-free}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -r infra/free/* "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Deploy compose stack
        if: steps.free-check.outputs.enabled == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.FREE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.FREE_DEPLOY_USER }}
          FREE_DEPLOY_PATH: ${{ vars.FREE_DEPLOY_PATH }}
          FREE_API_DOMAIN: ${{ vars.FREE_API_DOMAIN }}
          FREE_CLIENT_DASHBOARD_DOMAIN: ${{ vars.FREE_CLIENT_DASHBOARD_DOMAIN }}
          FREE_IMAGE_TAG: ${{ vars.FREE_IMAGE_TAG }}
          FREE_IMAGE_REGISTRY_PREFIX: ${{ vars.FREE_IMAGE_REGISTRY_PREFIX }}
          FREE_PASSKEY_RP_ID: ${{ vars.FREE_PASSKEY_RP_ID }}
          FREE_CORS_ALLOWED_ORIGINS: ${{ vars.FREE_CORS_ALLOWED_ORIGINS }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          FREE_POSTGRES_PASSWORD: ${{ secrets.FREE_POSTGRES_PASSWORD }}
          FREE_GATEWAY_INTERNAL_API_TOKEN: ${{ secrets.FREE_GATEWAY_INTERNAL_API_TOKEN }}
          FREE_ORDERS_INTERNAL_API_TOKEN: ${{ secrets.FREE_ORDERS_INTERNAL_API_TOKEN }}
          FREE_LOYALTY_INTERNAL_API_TOKEN: ${{ secrets.FREE_LOYALTY_INTERNAL_API_TOKEN }}
          FREE_NOTIFICATIONS_INTERNAL_API_TOKEN: ${{ secrets.FREE_NOTIFICATIONS_INTERNAL_API_TOKEN }}
          FREE_JWT_SECRET: ${{ secrets.FREE_JWT_SECRET }}
          FREE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.FREE_GOOGLE_OAUTH_CLIENT_ID }}
          FREE_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.FREE_GOOGLE_OAUTH_CLIENT_SECRET }}
          FREE_GOOGLE_OAUTH_STATE_SECRET: ${{ secrets.FREE_GOOGLE_OAUTH_STATE_SECRET }}
          FREE_GOOGLE_OAUTH_ALLOWED_REDIRECT_URIS: ${{ vars.FREE_GOOGLE_OAUTH_ALLOWED_REDIRECT_URIS }}
          FREE_PAYMENTS_PROVIDER_MODE: ${{ vars.FREE_PAYMENTS_PROVIDER_MODE }}
          FREE_CLOVER_OAUTH_ENVIRONMENT: ${{ vars.FREE_CLOVER_OAUTH_ENVIRONMENT }}
          FREE_CLOVER_CHARGE_ENDPOINT: ${{ vars.FREE_CLOVER_CHARGE_ENDPOINT }}
          FREE_CLOVER_REFUND_ENDPOINT: ${{ vars.FREE_CLOVER_REFUND_ENDPOINT }}
          FREE_CLOVER_APPLE_PAY_TOKENIZE_ENDPOINT: ${{ vars.FREE_CLOVER_APPLE_PAY_TOKENIZE_ENDPOINT }}
          FREE_CLOVER_BEARER_TOKEN: ${{ secrets.FREE_CLOVER_BEARER_TOKEN }}
          FREE_CLOVER_API_KEY: ${{ secrets.FREE_CLOVER_API_KEY }}
          FREE_CLOVER_API_ACCESS_KEY: ${{ secrets.FREE_CLOVER_API_ACCESS_KEY }}
          FREE_CLOVER_MERCHANT_ID: ${{ secrets.FREE_CLOVER_MERCHANT_ID }}
          FREE_CLOVER_APP_ID: ${{ secrets.FREE_CLOVER_APP_ID }}
          FREE_CLOVER_APP_SECRET: ${{ secrets.FREE_CLOVER_APP_SECRET }}
          FREE_CLOVER_OAUTH_REDIRECT_URI: ${{ secrets.FREE_CLOVER_OAUTH_REDIRECT_URI }}
          FREE_CLOVER_OAUTH_STATE_SECRET: ${{ secrets.FREE_CLOVER_OAUTH_STATE_SECRET }}
          FREE_CLOVER_WEBHOOK_SHARED_SECRET: ${{ secrets.FREE_CLOVER_WEBHOOK_SHARED_SECRET }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          DEPLOY_PATH="${FREE_DEPLOY_PATH:-/opt/gazelle-free}"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "export DEPLOY_PATH='${DEPLOY_PATH}' FREE_API_DOMAIN='${FREE_API_DOMAIN}' FREE_CLIENT_DASHBOARD_DOMAIN='${FREE_CLIENT_DASHBOARD_DOMAIN}' FREE_IMAGE_TAG='${FREE_IMAGE_TAG}' FREE_IMAGE_REGISTRY_PREFIX='${FREE_IMAGE_REGISTRY_PREFIX}' FREE_PASSKEY_RP_ID='${FREE_PASSKEY_RP_ID}' FREE_CORS_ALLOWED_ORIGINS='${FREE_CORS_ALLOWED_ORIGINS}' LETSENCRYPT_EMAIL='${LETSENCRYPT_EMAIL}' FREE_POSTGRES_PASSWORD='${FREE_POSTGRES_PASSWORD}' FREE_GATEWAY_INTERNAL_API_TOKEN='${FREE_GATEWAY_INTERNAL_API_TOKEN}' FREE_ORDERS_INTERNAL_API_TOKEN='${FREE_ORDERS_INTERNAL_API_TOKEN}' FREE_LOYALTY_INTERNAL_API_TOKEN='${FREE_LOYALTY_INTERNAL_API_TOKEN}' FREE_NOTIFICATIONS_INTERNAL_API_TOKEN='${FREE_NOTIFICATIONS_INTERNAL_API_TOKEN}' FREE_JWT_SECRET='${FREE_JWT_SECRET}' FREE_GOOGLE_OAUTH_CLIENT_ID='${FREE_GOOGLE_OAUTH_CLIENT_ID}' FREE_GOOGLE_OAUTH_CLIENT_SECRET='${FREE_GOOGLE_OAUTH_CLIENT_SECRET}' FREE_GOOGLE_OAUTH_STATE_SECRET='${FREE_GOOGLE_OAUTH_STATE_SECRET}' FREE_GOOGLE_OAUTH_ALLOWED_REDIRECT_URIS='${FREE_GOOGLE_OAUTH_ALLOWED_REDIRECT_URIS}' FREE_PAYMENTS_PROVIDER_MODE='${FREE_PAYMENTS_PROVIDER_MODE}' FREE_CLOVER_OAUTH_ENVIRONMENT='${FREE_CLOVER_OAUTH_ENVIRONMENT}' FREE_CLOVER_CHARGE_ENDPOINT='${FREE_CLOVER_CHARGE_ENDPOINT}' FREE_CLOVER_REFUND_ENDPOINT='${FREE_CLOVER_REFUND_ENDPOINT}' FREE_CLOVER_APPLE_PAY_TOKENIZE_ENDPOINT='${FREE_CLOVER_APPLE_PAY_TOKENIZE_ENDPOINT}' FREE_CLOVER_BEARER_TOKEN='${FREE_CLOVER_BEARER_TOKEN}' FREE_CLOVER_API_KEY='${FREE_CLOVER_API_KEY}' FREE_CLOVER_API_ACCESS_KEY='${FREE_CLOVER_API_ACCESS_KEY}' FREE_CLOVER_MERCHANT_ID='${FREE_CLOVER_MERCHANT_ID}' FREE_CLOVER_APP_ID='${FREE_CLOVER_APP_ID}' FREE_CLOVER_APP_SECRET='${FREE_CLOVER_APP_SECRET}' FREE_CLOVER_OAUTH_REDIRECT_URI='${FREE_CLOVER_OAUTH_REDIRECT_URI}' FREE_CLOVER_OAUTH_STATE_SECRET='${FREE_CLOVER_OAUTH_STATE_SECRET}' FREE_CLOVER_WEBHOOK_SHARED_SECRET='${FREE_CLOVER_WEBHOOK_SHARED_SECRET}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}'; bash -s" <<'REMOTE'
          set -euo pipefail

          cd "${DEPLOY_PATH}"
          if [ -n "${FREE_CORS_ALLOWED_ORIGINS:-}" ]; then
            CORS_ALLOWED_ORIGINS_VALUE="${FREE_CORS_ALLOWED_ORIGINS}"
          elif [ -n "${FREE_CLIENT_DASHBOARD_DOMAIN:-}" ]; then
            CORS_ALLOWED_ORIGINS_VALUE="https://${FREE_CLIENT_DASHBOARD_DOMAIN}"
          else
            CORS_ALLOWED_ORIGINS_VALUE="https://${FREE_API_DOMAIN}"
          fi
          DATABASE_URL_VALUE="postgresql://gazelle:${FREE_POSTGRES_PASSWORD}@postgres:5432/gazelle"
          PUBLIC_API_BASE_URL_VALUE="https://${FREE_API_DOMAIN}/v1"

          cat > .env <<ENVVARS
          API_DOMAIN=${FREE_API_DOMAIN}
          LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
          IMAGE_REGISTRY_PREFIX=${FREE_IMAGE_REGISTRY_PREFIX}
          IMAGE_TAG=${FREE_IMAGE_TAG:-latest}
          POSTGRES_PASSWORD=${FREE_POSTGRES_PASSWORD}
          DATABASE_URL=${DATABASE_URL_VALUE}
          GATEWAY_INTERNAL_API_TOKEN=${FREE_GATEWAY_INTERNAL_API_TOKEN}
          ORDERS_INTERNAL_API_TOKEN=${FREE_ORDERS_INTERNAL_API_TOKEN}
          LOYALTY_INTERNAL_API_TOKEN=${FREE_LOYALTY_INTERNAL_API_TOKEN}
          NOTIFICATIONS_INTERNAL_API_TOKEN=${FREE_NOTIFICATIONS_INTERNAL_API_TOKEN}
          JWT_SECRET=${FREE_JWT_SECRET}
          PAYMENTS_PROVIDER_MODE=${FREE_PAYMENTS_PROVIDER_MODE:-simulated}
          CLOVER_PROVIDER_MODE=${FREE_PAYMENTS_PROVIDER_MODE:-simulated}
          CLOVER_BEARER_TOKEN=${FREE_CLOVER_BEARER_TOKEN}
          CLOVER_API_KEY=${FREE_CLOVER_API_KEY}
          CLOVER_API_ACCESS_KEY=${FREE_CLOVER_API_ACCESS_KEY}
          CLOVER_MERCHANT_ID=${FREE_CLOVER_MERCHANT_ID}
          CLOVER_OAUTH_ENVIRONMENT=${FREE_CLOVER_OAUTH_ENVIRONMENT:-sandbox}
          CLOVER_APP_ID=${FREE_CLOVER_APP_ID}
          CLOVER_APP_SECRET=${FREE_CLOVER_APP_SECRET}
          CLOVER_OAUTH_REDIRECT_URI=${FREE_CLOVER_OAUTH_REDIRECT_URI}
          CLOVER_OAUTH_STATE_SECRET=${FREE_CLOVER_OAUTH_STATE_SECRET}
          CLOVER_CHARGE_ENDPOINT=${FREE_CLOVER_CHARGE_ENDPOINT}
          CLOVER_REFUND_ENDPOINT=${FREE_CLOVER_REFUND_ENDPOINT}
          CLOVER_APPLE_PAY_TOKENIZE_ENDPOINT=${FREE_CLOVER_APPLE_PAY_TOKENIZE_ENDPOINT}
          CLOVER_WEBHOOK_SHARED_SECRET=${FREE_CLOVER_WEBHOOK_SHARED_SECRET}
          CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS_VALUE}
          PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL_VALUE}
          PASSKEY_RP_ID=${FREE_PASSKEY_RP_ID:-${FREE_API_DOMAIN}}
          GOOGLE_OAUTH_CLIENT_ID=${FREE_GOOGLE_OAUTH_CLIENT_ID}
          GOOGLE_OAUTH_CLIENT_SECRET=${FREE_GOOGLE_OAUTH_CLIENT_SECRET}
          GOOGLE_OAUTH_STATE_SECRET=${FREE_GOOGLE_OAUTH_STATE_SECRET}
          GOOGLE_OAUTH_ALLOWED_REDIRECT_URIS=${FREE_GOOGLE_OAUTH_ALLOWED_REDIRECT_URIS}
          ENVVARS

          if [ -n "${GHCR_USERNAME}" ] && [ -n "${GHCR_TOKEN}" ]; then
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          fi

          ./bin/check-live-payments-env.sh .env
          docker compose --env-file .env pull
          docker compose --env-file .env up -d --remove-orphans
          docker compose --env-file .env ps
          REMOTE

      - name: Smoke check deployed gateway
        if: steps.free-check.outputs.enabled == 'true'
        env:
          FREE_API_DOMAIN: ${{ vars.FREE_API_DOMAIN }}
        run: |
          curl --fail --silent --show-error "https://${FREE_API_DOMAIN}/health"
          curl --fail --silent --show-error "https://${FREE_API_DOMAIN}/ready"

      - name: Skip free deploy (prerequisites missing)
        if: steps.free-check.outputs.enabled != 'true'
        run: echo "deploy-free skipped due to missing required secrets/variables."
